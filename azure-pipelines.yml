# Azure DevOps Pipeline — Deploy Jenkins VM via ARM Template

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - jenkins-infra/arm-template/**
      - jenkins-infra/Jenkins/**
      - jenkins-infra/deploy.sh

pr:
  branches:
    include:
      - main

# ── Variables ─────────────────────────────────────────────────────────
variables:
  azureServiceConnection: 'azure-service-connection'
  resourceGroupName: 'rg-jenkins-infra-dev'        # Must match deploy.sh
  location: 'eastus2'
  templateFile:   '$(System.DefaultWorkingDirectory)/jenkins-infra/arm-template/azuredeploy.json'
  parametersFile: '$(System.DefaultWorkingDirectory)/jenkins-infra/Jenkins/azuredeploy.parameters.json'
  deploymentName: 'jenkins-vm-deploy-$(Build.BuildId)'

# ══════════════════════════════════════════════════════════════════════
# Stage 1 — Validate (runs on every PR and push to main)
# ══════════════════════════════════════════════════════════════════════
stages:
- stage: Validate
  displayName: 'Validate ARM Template'
  jobs:
  - job: ValidateTemplate
    displayName: 'Lint & Validate ARM Template'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - checkout: self
      displayName: 'Checkout Repository'

    - task: AzureCLI@2
      displayName: 'Validate ARM Template (what-if)'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'scriptPath'
        scriptPath: '$(System.DefaultWorkingDirectory)/jenkins-infra/deploy.sh'
        arguments: '$(SSH_PUBLIC_KEY)'
        failOnStandardError: true

# ══════════════════════════════════════════════════════════════════════
# Stage 2 — Deploy (only on push to main, not on PRs)
# ══════════════════════════════════════════════════════════════════════
- stage: Deploy
  displayName: 'Deploy Jenkins VM'
  dependsOn: Validate
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployVM
    displayName: 'Deploy Azure VM with Jenkins'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'jenkins-dev'
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self
            displayName: 'Checkout Repository'

          - task: AzureCLI@2
            displayName: 'Deploy ARM Template'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "========================================="
                echo "  Ensure Resource Group exists           "
                echo "========================================="
                az group create \
                  --name $(resourceGroupName) \
                  --location $(location) \
                  --output table

                echo "========================================="
                echo "  Deploying Jenkins VM ARM Template      "
                echo "========================================="
                az deployment group create \
                  --name $(deploymentName) \
                  --resource-group $(resourceGroupName) \
                  --template-file $(templateFile) \
                  --parameters @$(parametersFile) \
                  --parameters sshPublicKey="$(SSH_PUBLIC_KEY)" \
                  --output table

                echo ""
                echo "========================================="
                echo "  Deployment Outputs                     "
                echo "========================================="
                az deployment group show \
                  --name $(deploymentName) \
                  --resource-group $(resourceGroupName) \
                  --query properties.outputs \
                  --output table

          - task: AzureCLI@2
            displayName: 'Wait for VM to be ready'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Fetching VM Public IP..."
                VM_IP=$(az deployment group show \
                  --name $(deploymentName) \
                  --resource-group $(resourceGroupName) \
                  --query "properties.outputs.vmPublicIP.value" \
                  --output tsv)

                if [ -z "$VM_IP" ] || [ "$VM_IP" = "null" ]; then
                  echo "ERROR: Could not retrieve VM Public IP from deployment outputs." >&2
                  echo "Check that azuredeploy.json has an 'outputs' block." >&2
                  exit 1
                fi

                echo "VM Public IP : $VM_IP"
                echo "Jenkins URL  : http://$VM_IP:8080"
                echo "##vso[task.setvariable variable=VM_IP;isOutput=true]$VM_IP"

                echo "Waiting for SSH port 22 to be reachable (up to 3 minutes)..."
                for i in {1..18}; do
                  if nc -z -w 5 "$VM_IP" 22 2>/dev/null; then
                    echo "VM SSH is reachable."
                    break
                  fi
                  echo "Attempt $i/18 — waiting 10s..."
                  sleep 10
                done

          - task: AzureCLI@2
            displayName: 'Print Summary'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                VM_IP=$(az deployment group show \
                  --name $(deploymentName) \
                  --resource-group $(resourceGroupName) \
                  --query "properties.outputs.vmPublicIP.value" \
                  --output tsv)

                VM_FQDN=$(az deployment group show \
                  --name $(deploymentName) \
                  --resource-group $(resourceGroupName) \
                  --query "properties.outputs.vmFQDN.value" \
                  --output tsv)

                echo "============================================"
                echo "  DEPLOYMENT COMPLETE"
                echo "============================================"
                echo "  VM Public IP   : $VM_IP"
                echo "  VM FQDN        : $VM_FQDN"
                echo "  Jenkins URL    : http://$VM_IP:8080"
                echo "  SSH Command    : ssh azureuser@$VM_IP"
                echo "============================================"
                echo ""
                echo "Next Steps:"
                echo "  1. SSH into the VM:"
                echo "     ssh -i ~/.ssh/jenkins_azure azureuser@$VM_IP"
                echo "  2. Get the Jenkins initial password:"
                echo "     sudo cat /var/lib/jenkins/secrets/initialAdminPassword"
                echo "  3. Open Jenkins:"
                echo "     http://$VM_IP:8080"
                echo "============================================"